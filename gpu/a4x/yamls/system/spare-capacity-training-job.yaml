apiVersion: v1
kind: Pod
metadata:
  name: training-preempt-test
  labels:
    app: training-preempt-test
spec:
  priorityClassName: gpu-training
  tolerations:
  - key: nvidia.com/gpu
    operator: Exists
    effect: NoSchedule
  - key: kubernetes.io/arch
    operator: Equal
    value: arm64
    effect: NoSchedule
  restartPolicy: Never
  containers:
  - name: gpu-test
    image: nvcr.io/nvidia/cuda:13.0.0-base-ubuntu24.04
    command: ["bash", "-c"]
    args:
    - |
      echo "=== Training pod started, verifying GPU access ==="
      nvidia-smi
      echo "=== GPU verification complete ==="
      sleep 300
    resources:
      limits:
        nvidia.com/gpu: 4
