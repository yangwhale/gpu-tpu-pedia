apiVersion: apps/v1
kind: Deployment
metadata:
  name: gpu-placeholder
  labels:
    app: gpu-placeholder
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gpu-placeholder
  template:
    metadata:
      labels:
        app: gpu-placeholder
    spec:
      priorityClassName: gpu-placeholder
      tolerations:
      - key: nvidia.com/gpu
        operator: Exists
        effect: NoSchedule
      - key: kubernetes.io/arch
        operator: Equal
        value: arm64
        effect: NoSchedule
      terminationGracePeriodSeconds: 0
      containers:
      - name: pause
        image: registry.k8s.io/pause:3.9
        resources:
          limits:
            nvidia.com/gpu: 4
